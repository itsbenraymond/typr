<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body {
        background: transparent;
        overflow: hidden;
        user-select: none;
        -webkit-user-select: none;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
      }

      /* ── New bar — OpenWhispr solid-black pill ───────────── */
      .bar {
        display: flex;
        align-items: center;
        justify-content: center;
        height: 44px;
        min-width: 120px;
        padding: 0 20px;
        border-radius: 9999px;
        background: #000;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.45);
      }

      /* ── Waveform — typr 12-bar adaptive engine ──────────── */
      .wave {
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 3px;
      }

      .wave span {
        display: block;
        width: 3px;
        height: 100%;
        background: rgba(255, 255, 255, 0.9);
        border-radius: 9999px;
        transform-origin: center;
        transform: scaleY(0.08);
        opacity: 0.55;
        transition: transform 45ms linear, opacity 45ms linear;
      }

      /* ── Recording: JS-driven inline transforms; no CSS animation ── */

      /* ── Transcribing: white pulse, JS levels disabled ───────────── */
      .bar[data-state="transcribing"] .wave span {
        background: rgba(255, 255, 255, 0.9);
        animation: wave 0.6s ease-in-out infinite;
      }
      .bar[data-state="transcribing"] .wave span:nth-child(1)  { animation-delay: 0.00s; }
      .bar[data-state="transcribing"] .wave span:nth-child(2)  { animation-delay: 0.05s; }
      .bar[data-state="transcribing"] .wave span:nth-child(3)  { animation-delay: 0.10s; }
      .bar[data-state="transcribing"] .wave span:nth-child(4)  { animation-delay: 0.15s; }
      .bar[data-state="transcribing"] .wave span:nth-child(5)  { animation-delay: 0.20s; }
      .bar[data-state="transcribing"] .wave span:nth-child(6)  { animation-delay: 0.25s; }
      .bar[data-state="transcribing"] .wave span:nth-child(7)  { animation-delay: 0.30s; }
      .bar[data-state="transcribing"] .wave span:nth-child(8)  { animation-delay: 0.25s; }
      .bar[data-state="transcribing"] .wave span:nth-child(9)  { animation-delay: 0.20s; }
      .bar[data-state="transcribing"] .wave span:nth-child(10) { animation-delay: 0.15s; }
      .bar[data-state="transcribing"] .wave span:nth-child(11) { animation-delay: 0.10s; }
      .bar[data-state="transcribing"] .wave span:nth-child(12) { animation-delay: 0.05s; }

      @keyframes wave {
        0%, 100% { transform: scaleY(0.22); opacity: 0.55; }
        50%      { transform: scaleY(1.0);  opacity: 1; }
      }

      /* Error state — red flash */
      .bar[data-state="error"] .wave span {
        background: #e5484d;
        animation: wave 0.4s ease-in-out infinite;
      }
    </style>
  </head>
  <body>
    <div class="bar" id="bar" data-state="recording">
      <div class="wave" aria-hidden="true">
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
        <span></span><span></span><span></span><span></span>
      </div>
    </div>

    <script>
      const invoke = (cmd, args) => window.__TAURI__.core.invoke(cmd, args);

      const bar = document.getElementById('bar');
      const bars = Array.from(document.querySelectorAll('.wave span'));

      // Sliding window: newest level lands on the rightmost bar, scrolls left.
      const FLOOR = 0.06;
      const levels = new Array(bars.length).fill(FLOOR);
      // Adaptive noise floor and peak — auto-calibrate to your mic + room.
      let baseline = 0.006;  // ambient room/mic noise level (RMS)
      let peak = 0.05;       // recent loud peak (RMS)
      // Hysteretic gate — high threshold to open, low threshold to stay open.
      // Kills single-sample flicks of ambient noise without choking real speech.
      const GATE_OPEN = 3.0;   // × baseline to start showing signal
      const GATE_CLOSE = 1.6;  // × baseline to stop showing signal
      let gateOpen = false;
      // 2-tap input smoothing kills isolated noise blips before they hit the gate.
      let prevRms = 0;

      function paint() {
        for (let i = 0; i < bars.length; i++) {
          const v = levels[i];
          bars[i].style.transform = `scaleY(${v.toFixed(3)})`;
          bars[i].style.opacity = String(0.4 + v * 0.6);
        }
      }

      // Called by Rust ~30x/sec via overlay.eval() — see recorder.rs.
      window.__pushLevel = function (rmsRaw) {
        if (bar.getAttribute('data-state') !== 'recording') return;

        // Light input smoothing: average of last two samples kills lone blips.
        const rms = (rmsRaw + prevRms) * 0.5;
        prevRms = rmsRaw;

        // Baseline tracks ambient: snaps DOWN quickly on quieter samples,
        // creeps UP very slowly. After a few seconds of silence it equals
        // the room's noise floor.
        if (rms < baseline) baseline = baseline * 0.75 + rms * 0.25;
        else                baseline = baseline * 0.9995 + rms * 0.0005;
        if (baseline < 0.002) baseline = 0.002;

        // Peak: snap UP on louder samples, decay slowly so the bar height
        // stays referenced to your loudest recent syllable.
        if (rms > peak) peak = rms;
        else            peak = peak * 0.992 + rms * 0.008;
        if (peak < baseline * 8) peak = baseline * 8;

        // Hysteretic gate — flips open at GATE_OPEN, closes at GATE_CLOSE.
        const openThresh  = baseline * GATE_OPEN;
        const closeThresh = baseline * GATE_CLOSE;
        if (gateOpen) {
          if (rms < closeThresh) gateOpen = false;
        } else {
          if (rms > openThresh) gateOpen = true;
        }

        let v;
        if (!gateOpen) {
          v = FLOOR;
        } else {
          const above = rms - closeThresh;
          const range = Math.max(0.001, peak - closeThresh);
          const norm = Math.min(1.0, above / range);
          // Aggressive curve + gain bump = more pop on speech.
          v = Math.max(0.18, Math.min(1.0, Math.pow(norm, 0.45) * 1.15));
        }

        levels.shift();
        levels.push(v);
        paint();
      };

      function resetBars() {
        for (let i = 0; i < bars.length; i++) {
          bars[i].style.transform = '';
          bars[i].style.opacity = '';
          levels[i] = FLOOR;
        }
        baseline = 0.006;
        peak = 0.05;
        gateOpen = false;
        prevRms = 0;
      }

      // Clear inline styles when leaving recording so the transcribing CSS
      // animation (or hidden idle state) takes over cleanly.
      const obs = new MutationObserver(() => {
        if (bar.getAttribute('data-state') !== 'recording') resetBars();
      });
      obs.observe(bar, { attributes: true, attributeFilter: ['data-state'] });

      // Button-less pill (OpenWhispr B look). Controls stay reachable by key:
      //   Stop + send  → the global record hotkey toggles recording off (main.rs).
      //   Cancel       → Escape, since cancel has no global shortcut.
      window.addEventListener('keydown', async (e) => {
        if (e.key !== 'Escape') return;
        if (bar.getAttribute('data-state') !== 'recording') return;
        e.preventDefault();
        try { await invoke('cancel_recording'); }
        catch (err) { console.error('[Typr] cancel_recording failed:', err); }
      });

      window.__TAURI__.event.listen('format-error', () => {
        bar.setAttribute('data-state', 'error');
        setTimeout(() => {
          bar.setAttribute('data-state', 'ready');
        }, 1500);
      });
    </script>
  </body>
</html>
